services:
  builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - ../site:/out
    command: >
      sh -lc "
        npm install -g pnpm &&
        pnpm install &&
        pnpm run build &&
        rm -rf /out/* &&
        cp -a dist/. /out/
      "
    profiles: ["build"]

  web:
    image: nginx:alpine
    container_name: crowdfunding-product-page
    ports:
      - "8086:80"
    volumes:
      - ../site:/usr/share/nginx/html:ro
    restart: unless-stopped